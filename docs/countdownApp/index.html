<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="container">
        <h2>New Year CountDown</h2>
        <div id="countdown">
            <div class="time"><span id="day">00</span></div>
            <div class="time"><span id="hour">00</span></div>
            <div class="time"><span id="minute">00</span></div>
            <div class="time"><span id="second">00</span></div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
