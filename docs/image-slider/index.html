<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iamge-Slider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="slider">
        <div class="slides">
            <img src="https://picsum.photos/600/300?random=1" alt="slide-1">
            <img src="https://picsum.photos/600/300?random=2" alt="slide-2">
            <img src="https://picsum.photos/600/300?random=3" alt="slide-3">
            <img src="https://picsum.photos/600/300?random=4" alt="slide-4">
        </div>

        <button class="btn prev"><i class="fas fa-chevron-left"></i></button>
        <button class="btn next"><i class="fas fa-chevron-right"></i></button>

        <div class="dots"></div>

    </div>

    <script src="./script.js"></script>
    
</body>
</html>
