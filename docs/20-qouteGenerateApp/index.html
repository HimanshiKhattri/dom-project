<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qoute Generator App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="qoute-container">
        <h2>Random Qoute Generator (by math.random)</h2>
        <div class="qoute-box">
            <p id="qt-obj">Click Here To Get a Qoute!</p>
            <button id="btn-qt-obj">New Qoute</button>
        </div>
    </div>

    <div class="qoute-container">
        <h2>Random Qoute Generator (by Fetch API)</h2>
        <div class="qoute-box">
            <p id="qt-api">Click Here To Get a Qoute!</p>
            <button id="btn-qt-api">New Qoute</button>
        </div>
    </div>

    <script src="./script.js"></script>
    
</body>
</html>
